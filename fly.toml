# Fly.io deployment config for Project-Golem
# Deploy: fly launch --copy-config
#
# Free tier: 3 shared-cpu-1x VMs, 256MB RAM, 3GB persistent storage

app = "project-golem"
primary_region = "nrt"  # Tokyo

[build]
  dockerfile = "Dockerfile"

[env]
  ENABLE_WEB_DASHBOARD = "true"
  DASHBOARD_PORT = "3000"
  NODE_ENV = "production"
  GOLEM_LOCALE = "zh-TW"
  GOLEM_BRAIN_MODE = "api"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

[checks]
  [checks.health]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    path = "/api/health"
    port = 3000
    timeout = "5s"
    type = "http"
